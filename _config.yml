title: NLPLAB
description: SKK Univ. NLP LAB.
url: "https://hecarimday.github.io"
baseurl: ""

markdown: kramdown
highlighter: rouge

# [수정] 다시 기본 jekyll-paginate로 변경
plugins:
  - jekyll-paginate

# [수정] v2 방식이 아닌 v1 방식으로 설정
paginate: 10
paginate_path: "/Boards/page:num/"

navigation:
  - title: Home
    url: /index.html
  - title: About Us
    url: /AboutUs/Introduction/
  - title: Research
    url: /Research/Fields/
  - title: Publications
    url: /Publications/JournalPapers/
  - title: Members
    url: /Members/
  - title: Demos
    url: /Demos/Natural_Language_Processing/
  - title: Boards
    url: /Boards/index/
  - title: Links
    url: /Boards/link/

social:
  github: "https://github.com/NLPlab-skku"
  linkedin: "https://www.linkedin.com/company/skku-nlplab/posts/?feedView=all"
  apply: "https://forms.gle/bdW4K2uYqvteRWfX7"
  email: nlplab.skku@gmail.com

google_analytics: "UA-58263416-1"

# 빌드 시 불필요한 파일 제외 (속도 향상)
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .jekyll-cache